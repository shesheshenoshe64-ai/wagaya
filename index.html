<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
<meta name="theme-color" content="#FF8050"/>
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="わが家の手帳"/>
<title>わが家の手帳</title>
<link href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@400;700;800&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body,#root{height:100%}
body{font-family:'M PLUS Rounded 1c',sans-serif;background:#F4F1EE;color:#1E1E1E;-webkit-font-smoothing:antialiased;overscroll-behavior:none}
input,select,textarea,button{font-family:inherit}
input:focus,select:focus{outline:2px solid #FF5E8A;outline-offset:1px}
button{cursor:pointer;border:none;background:none}
a{color:inherit}

@keyframes slideUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
@keyframes pop{0%{transform:scale(1)}45%{transform:scale(1.22)}100%{transform:scale(1)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes checkBounce{0%{transform:scale(0);opacity:0}55%{transform:scale(1.35)}100%{transform:scale(1);opacity:1}}
@keyframes spin{to{transform:rotate(360deg)}}
.su{animation:slideUp .22s ease both}
.fi{animation:fadeIn .18s ease both}
.spinner{width:20px;height:20px;border:3px solid rgba(255,255,255,.35);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite;display:inline-block;vertical-align:middle;margin-right:6px}

/* Shell */
.shell{display:flex;flex-direction:column;height:100dvh;max-width:430px;margin:0 auto;background:#F4F1EE}

/* Header */
.hdr{background:linear-gradient(135deg,#FF8050 0%,#FF5E8A 55%,#A855F7 100%);padding:14px 18px 0;flex-shrink:0;box-shadow:0 3px 20px rgba(255,94,138,.28)}
.hdr-top{display:flex;align-items:center;gap:8px;margin-bottom:13px}
.hdr-title{color:#fff;font-size:17px;font-weight:800;flex:1;letter-spacing:.3px}
.hdr-members{display:flex;gap:1px}
.hdr-members span{font-size:20px}
.sync-pill{display:flex;align-items:center;gap:5px;padding:3px 9px;border-radius:20px;background:rgba(255,255,255,.18);font-size:10px;font-weight:700;color:#fff;flex-shrink:0}
.sync-dot{width:7px;height:7px;border-radius:50%}

/* Tabs */
.tabs{display:flex;gap:5px;padding-bottom:13px}
.tab{flex:1;padding:8px 2px;border-radius:11px;font-size:12px;font-weight:700;color:rgba(255,255,255,.7);background:rgba(255,255,255,.14);transition:all .18s;letter-spacing:.1px}
.tab.on{background:#fff;color:#FF5E8A;box-shadow:0 2px 10px rgba(0,0,0,.12)}

/* Content */
.content{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:13px 13px 30px}

/* Cards */
.card{background:#fff;border-radius:18px;padding:15px;margin-bottom:11px;box-shadow:0 2px 12px rgba(0,0,0,.055)}
.card-label{font-size:10px;font-weight:800;color:#AAA;letter-spacing:1px;text-transform:uppercase;margin-bottom:10px}

/* Field */
.field{width:100%;padding:12px 14px;border:2px solid #EBEBEB;border-radius:12px;font-size:15px;background:#FAFAFA;color:#1E1E1E;margin-bottom:10px;transition:border-color .15s}
.field:focus{border-color:#FF5E8A;background:#fff}
.field-mono{font-family:monospace;font-size:13px;word-break:break-all}

/* Buttons */
.btn{width:100%;padding:13px;border-radius:14px;font-size:15px;font-weight:800;letter-spacing:.2px;transition:transform .1s,opacity .1s}
.btn:active{transform:scale(.97);opacity:.9}
.btn:disabled{opacity:.5;transform:none}
.btn-grad{background:linear-gradient(135deg,#FF8050,#FF5E8A);color:#fff;box-shadow:0 4px 14px rgba(255,94,138,.32)}
.btn-purple{background:linear-gradient(135deg,#FF8050,#A855F7);color:#fff;box-shadow:0 4px 14px rgba(168,85,247,.28)}
.btn-ghost{background:none;border:2px dashed #DDD;color:#AAA}
.btn-ghost.warn{border-color:#FFB3C6;color:#FF5E8A}

/* Chips */
.chips{display:flex;gap:6px;flex-wrap:wrap}
.chip{padding:6px 13px;border-radius:20px;border:2px solid #E5E5E5;font-size:12px;font-weight:700;color:#888;background:#fff;transition:all .15s;white-space:nowrap}
.chip-row{display:flex;gap:5px;overflow-x:auto;padding-bottom:2px;scrollbar-width:none}
.chip-row::-webkit-scrollbar{display:none}
.m-chip{padding:7px 12px;border-radius:20px;border:2px solid #E5E5E5;font-size:13px;font-weight:600;background:#fff;transition:all .15s}
.toggle{padding:7px 16px;border-radius:20px;border:2px solid #E5E5E5;font-size:13px;font-weight:700;background:#fff;color:#999;transition:all .15s}
.toggle.on{border-color:#4CAF50;background:#e8f5e9;color:#4CAF50}

/* Shopping */
.shop-item{display:flex;align-items:center;gap:11px;padding:11px 0;border-bottom:1px solid #F2F2F2;transition:opacity .2s}
.shop-item:last-child{border-bottom:none}
.shop-item.done{opacity:.38}
.chk{width:27px;height:27px;border-radius:50%;border:2.5px solid #DDD;background:#fff;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .18s}
.chk.on{background:#4CAF50;border-color:#4CAF50;animation:pop .28s ease}
.chk-icon{color:#fff;font-size:15px;font-weight:900;animation:checkBounce .22s ease}
.shop-txt{flex:1;font-size:15px;font-weight:500}
.shop-txt.done{text-decoration:line-through;color:#BBB}
.shop-who{font-size:11px;font-weight:800;flex-shrink:0}
.del{color:#DDD;font-size:17px;padding:3px 5px;flex-shrink:0;border-radius:7px;transition:color .12s}
.del:active{color:#FF5E8A}
.cat-group{background:#fff;border-radius:18px;margin-bottom:10px;overflow:hidden;box-shadow:0 2px 10px rgba(0,0,0,.055)}
.cat-hdr{display:flex;align-items:center;gap:8px;padding:11px 15px 9px;border-bottom:1px solid #F5F5F5}
.cat-dot{width:11px;height:11px;border-radius:50%;flex-shrink:0}
.cat-name{font-size:14px;font-weight:800;flex:1}
.cat-cnt{padding:2px 10px;border-radius:10px;font-size:11px;font-weight:800}
.cat-items{padding:0 15px}

/* Palette */
.palette{display:flex;gap:7px;flex-wrap:wrap;margin-bottom:10px}
.pal-dot{width:30px;height:30px;border-radius:50%;border:3px solid transparent;transition:transform .12s;cursor:pointer}
.pal-dot:active{transform:scale(.82)}
.pal-dot.on{border-color:#1E1E1E}

/* Calendar */
.cal-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:11px}
.cal-arr{width:38px;height:38px;border-radius:12px;background:#fff;box-shadow:0 2px 8px rgba(0,0,0,.08);font-size:19px;font-weight:900;color:#FF5E8A;display:flex;align-items:center;justify-content:center;transition:transform .12s}
.cal-arr:active{transform:scale(.88)}
.cal-mo{font-weight:800;font-size:18px}
.cal-grid{background:#fff;border-radius:18px;overflow:hidden;box-shadow:0 2px 12px rgba(0,0,0,.055);margin-bottom:12px}
.cal-head{display:grid;grid-template-columns:repeat(7,1fr);background:linear-gradient(135deg,#FF8050,#FF5E8A)}
.cal-dow{text-align:center;padding:7px 0;font-size:11px;font-weight:800;color:rgba(255,255,255,.82)}
.cal-dow.s{color:#FFD0D0}.cal-dow.sa{color:#C8E6FF}
.cal-body{display:grid;grid-template-columns:repeat(7,1fr);gap:1px;background:#F0F0F0}
.cal-cell{background:#fff;min-height:50px;padding:5px 4px 4px;cursor:pointer;user-select:none}
.cal-cell:active,.cal-cell.sel{background:#FFF0F8}
.cal-cell.empty{background:#FAFAFA;cursor:default}
.cal-num{width:25px;height:25px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:600;margin-bottom:3px}
.cal-num.today{background:#FF5E8A;color:#fff;font-weight:800}
.cal-num.s{color:#E53935}.cal-num.sa{color:#1E88E5}
.cal-dots{display:flex;flex-wrap:wrap;gap:2px}
.cal-dot{width:5px;height:5px;border-radius:50%}
.ev-row{display:flex;align-items:flex-start;gap:9px;padding:11px 0;border-bottom:1px solid #F2F2F2}
.ev-row:last-child{border-bottom:none}
.badge{display:inline-flex;align-items:center;padding:2px 8px;border-radius:7px;font-size:11px;font-weight:800}
.badge-t{background:#FF5E8A18;color:#FF5E8A}.badge-all{background:#4CAF5018;color:#4CAF50}

/* Budget */
.sum-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:12px}
.sum-card{background:#fff;border-radius:14px;padding:12px 6px;text-align:center;box-shadow:0 2px 10px rgba(0,0,0,.055)}
.b-row{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid #F2F2F2}
.b-row:last-child{border-bottom:none}
.b-icon{width:38px;height:38px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.bar-row{margin-bottom:9px}
.bar-lbl{display:flex;justify-content:space-between;font-size:12px;margin-bottom:3px}
.bar-track{background:#F0F0F0;border-radius:4px;height:7px}
.bar-fill{height:100%;border-radius:4px;transition:width .55s cubic-bezier(.4,0,.2,1)}

/* Common */
.m-row{display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:1px solid #F2F2F2}
.m-row:last-child{border-bottom:none}
.sep{display:flex;align-items:center;gap:8px;margin:12px 0 10px;font-size:10px;font-weight:800;color:#BBB;letter-spacing:.8px;text-transform:uppercase}
.sep::before,.sep::after{content:'';flex:1;height:1px;background:#EBEBEB}
.empty{text-align:center;padding:26px 0 18px;color:#CCC;font-size:14px;line-height:1.9}
.empty-ico{font-size:36px;display:block;margin-bottom:6px}
.type-row{display:flex;gap:8px;margin-bottom:10px}
.type-btn{flex:1;padding:10px;border-radius:12px;border:2px solid #E5E5E5;font-size:13px;font-weight:700;background:#fff;transition:all .15s}
.type-btn.on{border-color:#FF5E8A;background:#FFF0F5;color:#FF5E8A}

/* Info boxes */
.box{border-radius:13px;padding:13px 14px;font-size:13px;line-height:1.8;margin-bottom:11px}
.box strong{display:block;font-size:14px;margin-bottom:4px}
.box-yellow{background:#FFFDE7;border:1.5px solid #FFD54F;color:#5D4000}
.box-green{background:#E8F5E9;border:1.5px solid #A5D6A7;color:#1B5E20}
.box-red{background:#FFEBEE;border:1.5px solid #FFCDD2;color:#B71C1C}
.box-blue{background:#E3F2FD;border:1.5px solid #90CAF9;color:#0D47A1}

/* Setup screen */

/* ── Board (swipe) ───────────────────────────────────────────────────────── */
.board-stack{position:relative;width:100%;height:340px;margin-bottom:4px}
.board-card{position:absolute;inset:0;background:#fff;border-radius:24px;box-shadow:0 8px 32px rgba(0,0,0,.13);padding:24px 22px 18px;display:flex;flex-direction:column;touch-action:pan-y;cursor:grab;user-select:none;will-change:transform}
.board-card:active{cursor:grabbing}
.board-who{display:flex;align-items:center;gap:8px;margin-bottom:14px}
.board-avatar{width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0}
.board-name{font-size:13px;font-weight:800}
.board-time{font-size:11px;color:#BBB;margin-left:auto}
.board-body{font-size:17px;font-weight:500;line-height:1.65;flex:1;overflow:hidden;word-break:break-word}
.board-hint{display:flex;justify-content:space-between;margin-top:10px;font-size:11px;font-weight:700}
.hint-left{color:#A0B4FF}
.hint-right{color:#FF8AAE}
.swipe-label{position:absolute;top:22px;padding:5px 14px;border-radius:20px;font-size:15px;font-weight:800;opacity:0;transition:opacity .1s;pointer-events:none;z-index:10}
.swipe-label.keep{left:18px;background:#E8F0FF;color:#3B5BDB}
.swipe-label.done{right:18px;background:#FFF0F5;color:#FF5E8A}
.board-empty{display:flex;flex-direction:column;align-items:center;justify-content:center;height:280px;color:#CCC;font-size:14px;gap:8px}
.board-empty-ico{font-size:48px}
.board-count{display:flex;gap:6px;justify-content:center;margin-bottom:2px}
.board-pip{width:7px;height:7px;border-radius:50%;background:#E0E0E0;transition:background .2s}
.board-pip.on{background:#FF5E8A}
.board-archived{margin-top:4px;width:100%}
.arc-row{display:flex;align-items:flex-start;gap:10px;padding:10px 0;border-bottom:1px solid #F2F2F2;opacity:.6}
.arc-row:last-child{border-bottom:none}
.board-post-card{background:#fff;border-radius:18px;padding:14px;margin-bottom:0;box-shadow:0 2px 12px rgba(0,0,0,.055);width:100%}
.notif-overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:500;display:flex;align-items:flex-end;justify-content:center;animation:fadeIn .18s ease}
.notif-card{background:#fff;border-radius:24px 24px 0 0;width:100%;max-width:430px;padding-bottom:max(16px,env(safe-area-inset-bottom));animation:slideUp .25s cubic-bezier(.25,1.4,.5,1)}
.notif-hdr{display:flex;align-items:center;gap:10px;padding:18px 16px 12px;border-bottom:1px solid #F0F0F0}
.notif-close{color:#CCC;font-size:18px;padding:4px 8px;border-radius:8px}
.notif-body{padding:12px 16px 0;max-height:55dvh;overflow-y:auto}
.notif-row{display:flex;align-items:flex-start;gap:10px;padding:8px 0;border-bottom:1px solid #F8F8F8}
.notif-row:last-child{border-bottom:none}
.notif-sub{padding:4px 0 4px 8px;opacity:.75}
.notif-icon{font-size:16px;flex-shrink:0;width:20px;text-align:center;margin-top:1px}
.notif-text{font-size:14px;line-height:1.5;font-weight:600}
.notif-sub .notif-text{font-size:13px;font-weight:500;color:#666}
.setup-bg{display:flex;flex-direction:column;align-items:center;justify-content:flex-start;min-height:100dvh;background:linear-gradient(160deg,#FFF5F8 0%,#F0EFFE 100%);padding:30px 20px 40px;overflow-y:auto}
.setup-logo{font-size:56px;margin-bottom:10px;line-height:1}
.setup-title{font-size:24px;font-weight:800;background:linear-gradient(135deg,#FF8050,#FF5E8A,#A855F7);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:4px}
.setup-sub{font-size:14px;color:#888;margin-bottom:24px;text-align:center;line-height:1.6}
.step-tabs{display:flex;gap:6px;margin-bottom:20px;width:100%}
.step-tab{flex:1;padding:8px 4px;border-radius:10px;font-size:11px;font-weight:800;border:2px solid;cursor:pointer;transition:all .15s}
.step-tab.on{border-color:#FF5E8A;background:#FFF0F5;color:#FF5E8A}
.step-tab.off{border-color:#E5E5E5;background:#fff;color:#AAA}
.step-num{display:inline-flex;width:20px;height:20px;border-radius:50%;background:#FF5E8A;color:#fff;font-size:10px;font-weight:800;align-items:center;justify-content:center;margin-right:4px}
.step-content{width:100%}
.step-card{background:#fff;border-radius:18px;padding:18px;box-shadow:0 4px 20px rgba(0,0,0,.08);margin-bottom:12px;width:100%}
.err-msg{background:#FFEBEE;border:1.5px solid #FFCDD2;border-radius:10px;padding:10px 12px;font-size:13px;color:#B71C1C;margin-bottom:10px;line-height:1.6}
.instruction-step{display:flex;gap:10px;margin-bottom:12px;align-items:flex-start}
.instruction-num{width:24px;height:24px;border-radius:50%;background:linear-gradient(135deg,#FF8050,#FF5E8A);color:#fff;font-size:12px;font-weight:800;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px}
.instruction-text{font-size:13px;line-height:1.7;color:#333;flex:1}
.instruction-text b{color:#FF5E8A}
.link-btn{display:inline-flex;align-items:center;gap:5px;padding:6px 14px;background:linear-gradient(135deg,#FF8050,#FF5E8A);color:#fff;border-radius:10px;font-size:13px;font-weight:700;text-decoration:none;margin-top:4px}
</style>
</head>
<body>
<div id="root"></div>

<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
import { getDatabase, ref, set, onValue, remove } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js';
import { useState, useEffect, useRef, useCallback, createElement as h, Fragment } from 'https://esm.sh/react@18';
import { createRoot } from 'https://esm.sh/react-dom@18/client';

// ── Constants ─────────────────────────────────────────────────────────────────
const LS_CFG = 'wagaya_firebase_cfg_v1';
const DB_PATH = 'wagaya/v1';
const LIM = { text:100, note:200, amount:9999999, cats:30, items:300, events:500, budget:500, members:8 };

const DEF_MEMBERS = [
  {id:'m1',name:'パパ',emoji:'👨',color:'#4A90D9'},
  {id:'m2',name:'ママ',emoji:'👩',color:'#E87CA0'},
  {id:'m3',name:'子ども1',emoji:'🧒',color:'#F5A623'},
  {id:'m4',name:'子ども2',emoji:'👦',color:'#5DAE5F'},
];
const DEF_CATS = [
  {id:'sc1',name:'スーパー',color:'#4CAF50'},
  {id:'sc2',name:'薬局',color:'#2196F3'},
  {id:'sc3',name:'100均',color:'#FF9800'},
  {id:'sc4',name:'ベビー用品',color:'#E91E8C'},
  {id:'sc5',name:'ホームセンター',color:'#795548'},
  {id:'sc6',name:'コンビニ',color:'#9C27B0'},
  {id:'sc7',name:'その他',color:'#78909C'},
];
const BCATS = ['食費','日用品','交通費','娯楽','医療','教育','その他'];
const BCLR = {食費:'#FF6B6B',日用品:'#4ECDC4',交通費:'#45B7D1',娯楽:'#7BC67E',医療:'#F0A500',教育:'#CE93D8',その他:'#B0BEC5'};
const PAL = ['#4CAF50','#2196F3','#FF9800','#E91E8C','#F44336','#795548','#9C27B0','#78909C','#009688','#FF5722','#3F51B5','#00BCD4','#8BC34A','#FFC107','#673AB7','#E91E63','#4A90D9','#F5A623','#5DAE5F','#FF7043'];
const EMOJIS = ['👨','👩','🧒','👦','👧','🧑','👴','👵','👶','🐣'];

// ── Security ──────────────────────────────────────────────────────────────────
const clean = (s, max=LIM.text) => String(s??'').slice(0,max).trim();
const cleanClr = c => /^#[0-9a-fA-F]{6}$/.test(c) ? c : '#78909C';
const cleanAmt = v => { const n=parseFloat(v); return Number.isFinite(n)&&n>=0&&n<=LIM.amount?n:0 };
const cleanDate = d => /^\d{4}-\d{2}-\d{2}$/.test(d) ? d : '';
const cleanTime = t => /^\d{2}:\d{2}$/.test(t) ? t : '';
const uid = () => crypto.randomUUID();
const today = () => { const d=new Date(); return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`; };
const vM = m => m&&typeof m.id==='string'&&typeof m.name==='string'&&m.name.length>0;
const vE = e => e&&typeof e.id==='string'&&typeof e.title==='string';
const vB = b => b&&typeof b.id==='string'&&typeof b.amount==='number'&&b.amount>=0;
const vS = i => i&&typeof i.id==='string'&&typeof i.text==='string';
const vC = c => c&&typeof c.id==='string'&&typeof c.name==='string';
const safeArr = (v, validator) => Array.isArray(v) ? v.filter(validator) : [];
const vN = n => n && typeof n.id==='string' && typeof n.text==='string' && n.text.length>0;

// ── Config persistence ────────────────────────────────────────────────────────
const loadCfg = () => { try { const v=localStorage.getItem(LS_CFG); return v?JSON.parse(v):null } catch { return null } };
const saveCfg = cfg => { try { localStorage.setItem(LS_CFG,JSON.stringify(cfg)) } catch {} };
const clearCfg = () => { try { localStorage.removeItem(LS_CFG) } catch {} };

// ── App ───────────────────────────────────────────────────────────────────────
let _db = null;

function App() {
  const [cfg, setCfg] = useState(loadCfg);
  const [db,  setDb]  = useState(null);

  useEffect(() => {
    if (!cfg) { _db = null; setDb(null); return; }
    try {
      const app = initializeApp(cfg, `wagaya-${Date.now()}`);
      _db = getDatabase(app);
      setDb(_db);
    } catch(e) {
      console.error('Firebase init:', e);
      setDb(null);
    }
  }, [cfg]);

  const handleSave = useCallback(newCfg => { saveCfg(newCfg); setCfg(newCfg); }, []);
  const handleReset = useCallback(() => { clearCfg(); _db=null; setCfg(null); setDb(null); }, []);

  if (!cfg || !db) return h(SetupScreen, { onSave: handleSave });
  return h(MainApp, { db, onReset: handleReset });
}

// ═══════════════════════ SETUP SCREEN ════════════════════════════════════════
function SetupScreen({ onSave }) {
  const [step,    setStep]    = useState('firebase'); // firebase | deploy | install
  const [apiKey,  setApiKey]  = useState('');
  const [projId,  setProjId]  = useState('');

// ═══════════════════════ MAIN APP ════════════════════════════════════════════
function MainApp({ db, onReset }) {
  const [tab,      setTab]      = useState('shop');
  const [synced,   setSynced]   = useState(false);
  const [members,  setMembers]  = useState(DEF_MEMBERS);
  const [events,   setEvents]   = useState([]);
  const [budget,   setBudget]   = useState([]);
  const [shopping, setShopping] = useState([]);
  const [shopCats, setShopCats] = useState(DEF_CATS);
  const [notes,    setNotes]    = useState([]);

  // ── お知らせポップアップ ──────────────────────────────────────────────────
  const [popup,       setPopup]       = useState(null);  // { items: [{icon,text}] }
  const notifiedRef   = useRef(false);
  const prevShopRef   = useRef(null);   // 前回の買い物リスト（localStorage）
  const LS_SHOP_SNAP  = 'wagaya_shop_snap_v1';

  // 初回同期完了時にポップアップ表示
  useEffect(() => {
    if (!synced || notifiedRef.current) return;
    notifiedRef.current = true;

    const todayStr = today();
    const items = [];

    // ① 今日の予定
    const todayEvs = events.filter(e => e.date === todayStr)
      .sort((a,b) => (a.time||'').localeCompare(b.time||''));
    if (todayEvs.length > 0) {
      items.push({ icon:'📅', text:`今日の予定 ${todayEvs.length}件` });
      todayEvs.forEach(e => {
        const timeStr = e.allDay ? '終日' : (e.time || '');
        items.push({ icon:'　', text: (timeStr ? timeStr+'　' : '') + e.title, sub:true });
      });
    }

    // ② 未完了の買い物
    const pending = shopping.filter(i => !i.done);
    if (pending.length > 0) {
      items.push({ icon:'🛒', text:`買い物リスト 残り${pending.length}件` });
    }

    // ③ 前回訪問から追加された買い物（他の家族が追加した可能性）
    try {
      const snapRaw = localStorage.getItem(LS_SHOP_SNAP);
      if (snapRaw) {
        const snap = JSON.parse(snapRaw);
        const prevIds = new Set(snap);
        const newItems = shopping.filter(i => !i.done && !prevIds.has(i.id));
        if (newItems.length > 0) {
          items.push({ icon:'✨', text:`前回から${newItems.length}件追加されました` });
          newItems.slice(0,3).forEach(i => {
            const m = members.find(x=>x.id===i.memberId);
            items.push({ icon:'　', text: i.text + (m ? `（${m.emoji}${m.name}）` : ''), sub:true });
          });
          if (newItems.length > 3) items.push({ icon:'　', text:`…他${newItems.length-3}件`, sub:true });
        }
      }
    } catch {}

    // 買い物IDスナップショットを保存
    try {
      localStorage.setItem(LS_SHOP_SNAP, JSON.stringify(shopping.map(i=>i.id)));
    } catch {}

    // 掲示板の未読
    const unread = notes.filter(n => !n.archived);
    if (unread.length > 0) {
      items.push({ icon:'📝', text:`掲示板の未読メッセージ ${unread.length}件` });
    }

    if (items.length > 0) setPopup({ items });
  }, [synced]);

  // 買い物変化時にスナップ更新
  useEffect(() => {
    if (!synced) return;
    try { localStorage.setItem(LS_SHOP_SNAP, JSON.stringify(shopping.map(i=>i.id))); } catch {}
  }, [shopping]);

  // Track writes to avoid echo
  const writing = useRef({});

  // ── Firebase listeners ────────────────────────────────────────────────────
  useEffect(() => {
    if (!db) return;
    const unsubs = [];
    const listen = (path, setter, validator, def) => {
      const r = ref(db, `${DB_PATH}/${path}`);
      const u = onValue(r, snap => {
        if (writing.current[path]) return; // skip echo of own write
        const v = snap.val();
        if (v === null) { setter(def); setSynced(true); return; }
        const arr = safeArr(Object.values(v), validator);
        setter(arr.length > 0 ? arr : def);
        setSynced(true);
      }, () => setSynced(false));
      unsubs.push(u);
    };
    listen('members',  setMembers,  vM, DEF_MEMBERS);
    listen('events',   setEvents,   vE, []);
    listen('budget',   setBudget,   vB, []);
    listen('shopping', setShopping, vS, []);
    listen('shopCats', setShopCats, vC, DEF_CATS);
    listen('notes',    setNotes,    vN, []);
    return () => unsubs.forEach(u => u());
  }, [db]);

  // ── Write helper: flag to suppress echo, then write ───────────────────────
  const writeDb = useCallback((path, arr) => {
    if (!db) return;
    writing.current[path] = true;
    const obj = {};
    arr.forEach(item => { obj[item.id] = item; });
    set(ref(db, `${DB_PATH}/${path}`), Object.keys(obj).length ? obj : null)
      .catch(() => {})
      .finally(() => { setTimeout(() => { writing.current[path] = false; }, 3000); });
  }, [db]);

  // Sync to Firebase on every change
  useEffect(() => { if (synced) writeDb('members',  members);  }, [members]);
  useEffect(() => { if (synced) writeDb('events',   events);   }, [events]);
  useEffect(() => { if (synced) writeDb('budget',   budget);   }, [budget]);
  useEffect(() => { if (synced) writeDb('shopping', shopping); }, [shopping]);
  useEffect(() => { if (synced) writeDb('shopCats', shopCats); }, [shopCats]);
  useEffect(() => { if (synced) writeDb('notes',    notes);    }, [notes]);

  const TABS = [
    { k:'menu',   label:'🍽 献立' },
    { k:'shop',   label:'🛒 買い物' },
    { k:'cal',    label:'📅 予定' },
    { k:'budget', label:'💰 家計' },
    { k:'board',  label:'📝 掲示板' },
    { k:'cfg',    label:'⚙️' },
  ];

  return h('div', { className:'shell' },

    // ── お知らせポップアップ ────────────────────────────────────────────────
    popup && h('div', { className:'notif-overlay', onClick:()=>setPopup(null) },
      h('div', { className:'notif-card', onClick:e=>e.stopPropagation() },
        h('div', { className:'notif-hdr' },
          h('span', { style:{fontSize:22} }, '🏠'),
          h('div', { style:{flex:1,fontWeight:800,fontSize:16} }, 'わが家のお知らせ'),
          h('button', { className:'notif-close', onClick:()=>setPopup(null) }, '✕'),
        ),
        h('div', { className:'notif-body' },
          popup.items.map((item, i) =>
            h('div', { key:i, className:'notif-row'+(item.sub?' notif-sub':'') },
              h('span', { className:'notif-icon' }, item.icon),
              h('span', { className:'notif-text' }, item.text),
            )
          )
        ),
        h('button', {
          className:'btn btn-grad',
          style:{margin:'12px 16px 0',width:'calc(100% - 32px)',boxShadow:'none'},
          onClick:()=>setPopup(null),
        }, 'OK'),
      ),
    ),
    // Header
    h('div', { className:'hdr' },
      h('div', { className:'hdr-top' },
        h('span', { style:{fontSize:26} }, '🏠'),
        h('div', { className:'hdr-title' }, 'わが家の手帳'),
        h('div', { className:'sync-pill' },
          h('div', { className:'sync-dot', style:{background: synced ? '#4CAF50' : '#FF9800'} }),
          synced ? '同期中' : '接続中…'
        ),
        h('div', { className:'hdr-members' },
          members.map(m => h('span', { key:m.id, title:m.name }, m.emoji))
        ),
      ),
      h('div', { className:'tabs' },
        TABS.map(t => h('button', { key:t.k, className:'tab'+(tab===t.k?' on':''), onClick:()=>setTab(t.k) }, t.label))
      ),
    ),
    // Content
    h('div', { className:'content' },
      tab==='menu'   && h(MenuTab,   { shopping, setShopping, shopCats, members }),
      tab==='shop'   && h(ShopTab,   { shopping, setShopping, shopCats, setShopCats, members }),
      tab==='cal'    && h(CalTab,    { events, setEvents, members }),
      tab==='budget' && h(BudgetTab, { budget, setBudget, members }),
      tab==='board'  && h(BoardTab,  { notes, setNotes, members }),
      tab==='cfg'    && h(CfgTab,    { members, setMembers, onReset }),
    ),
  );
}

// ═══════════════════════ MENU SUGGEST ═══════════════════════════════════════
const CAT_COLORS = {煮物:'#FF8C42',揚げ物:'#E84393',中華:'#C0392B',カレー:'#F39C12',炒め物:'#27AE60',洋食:'#2980B9',丼物:'#8E44AD',汁物:'#16A085',魚料理:'#1ABC9C',ご飯:'#D35400',副菜:'#7F8C8D',蒸し物:'#2C3E50',ヘルシー:'#27AE60'};

function fmtAmt(base, servings, baseServings) {
  const v = base * (servings / baseServings);
  if (v === 0) return '少々';
  if (Number.isInteger(v)) return String(v);
  // Round to 1 decimal
  const r = Math.round(v * 10) / 10;
  return Number.isInteger(r) ? String(r) : String(r);
}

function MenuTab({ shopping, setShopping, shopCats, members }) {
  const [recipe,    setRecipe]    = useState(null);
  const [servings,  setServings]  = useState(4);
  const [baseServ,  setBaseServ]  = useState(4);
  const [added,     setAdded]     = useState(false);
  const [history,   setHistory]   = useState([]);
  const [showSteps, setShowSteps] = useState(false);

  const pick = () => {
    // avoid recent repeats
    const pool = RECIPES.filter(r => !history.slice(-3).includes(r.name));
    const r = pool[Math.floor(Math.random() * pool.length)];
    setRecipe(r);
    setBaseServ(4);
    setServings(4);
    setAdded(false);
    setShowSteps(false);
    setHistory(h => [...h.slice(-9), r.name]);
  };

  const addToShop = () => {
    if (!recipe) return;
    const defaultCat = shopCats[0]?.id ?? '';
    const defaultMem = members[0]?.id ?? '';
    const newItems = recipe.ings.map(([name]) => ({
      id: uid(), text: name, memberId: defaultMem,
      catId: defaultCat, done: false,
    }));
    setShopping(p => {
      // dedupe: skip already-existing items
      const existing = new Set(p.map(i => i.text));
      return [...p, ...newItems.filter(i => !existing.has(i.text))];
    });
    setAdded(true);
  };

  const colBase = recipe ? (CAT_COLORS[recipe.cat] ?? '#FF5E8A') : '#FF5E8A';

  return h(Fragment, null,

    // ── ヘッダー ──────────────────────────────────────────────────────────────
    h('div', { style:{textAlign:'center',marginBottom:16} },
      h('div', { style:{fontSize:36,marginBottom:4} }, '🍽'),
      h('div', { style:{fontSize:18,fontWeight:800,color:'#333'} }, '今日の献立を提案'),
      h('div', { style:{fontSize:12,color:'#AAA',marginTop:2} }, 'ランダムで1品提案します'),
    ),

    // ── 提案ボタン ────────────────────────────────────────────────────────────
    h('button', {
      className: 'btn btn-grad',
      style: { marginBottom:12, fontSize:16, boxShadow:'0 4px 18px rgba(255,94,138,.32)' },
      onClick: pick,
    }, recipe ? '🔀 別の献立を提案' : '✨ 献立を提案する'),

    // ── レシピカード ──────────────────────────────────────────────────────────
    recipe && h('div', { className:'card fi', style:{borderTop:`4px solid ${colBase}`} },

      // タイトル行
      h('div', { style:{display:'flex',alignItems:'center',gap:10,marginBottom:14} },
        h('div', { style:{
          padding:'4px 12px',borderRadius:20,fontSize:12,fontWeight:800,
          background:colBase+'18',color:colBase,
        }}, recipe.cat),
        h('div', { style:{fontSize:20,fontWeight:800,flex:1} }, recipe.name),
      ),

      // 人数スライダー
      h('div', { className:'card', style:{background:'#FAFAFA',padding:'12px 14px',marginBottom:12} },
        h('div', { style:{display:'flex',alignItems:'center',gap:12,marginBottom:8} },
          h('span', { style:{fontSize:13,fontWeight:800,color:'#888'} }, '👨‍👩‍👧‍👦 人数'),
          h('button', {
            onClick: () => setServings(s => Math.max(1,s-1)),
            style:{width:32,height:32,borderRadius:16,background:'#FF5E8A18',color:'#FF5E8A',fontSize:20,fontWeight:800,display:'flex',alignItems:'center',justifyContent:'center'},
          }, '−'),
          h('span', { style:{fontSize:22,fontWeight:800,minWidth:28,textAlign:'center'} }, servings),
          h('button', {
            onClick: () => setServings(s => Math.min(10,s+1)),
            style:{width:32,height:32,borderRadius:16,background:'#FF5E8A18',color:'#FF5E8A',fontSize:20,fontWeight:800,display:'flex',alignItems:'center',justifyContent:'center'},
          }, '＋'),
          h('span', { style:{fontSize:12,color:'#BBB'} }, '人前'),
        ),
      ),

      // 材料リスト
      h('div', { className:'card-label' }, '📦 材料'),
      h('div', { style:{marginBottom:14} },
        recipe.ings.map(([name, baseAmt, unit], i) =>
          h('div', { key:i, style:{
            display:'flex',justifyContent:'space-between',alignItems:'center',
            padding:'7px 0',borderBottom:'1px solid #F5F5F5',
          }},
            h('span', { style:{fontSize:14,fontWeight:600} }, name),
            h('span', { style:{fontSize:13,color:'#FF5E8A',fontWeight:800} },
              unit === '人分' ? servings+'人分'
              : unit === '適量' ? '適量'
              : fmtAmt(baseAmt, servings, baseServ) + ' ' + unit
            ),
          )
        )
      ),

      // レシピ手順（折りたたみ）
      h('button', {
        className: 'btn btn-ghost',
        style: {marginBottom:12, fontSize:13},
        onClick: () => setShowSteps(p=>!p),
      }, showSteps ? '▲ 手順を隠す' : '▼ 作り方を見る'),

      showSteps && h('div', { className:'fi' },
        recipe.steps.map((step, i) =>
          h('div', { key:i, style:{display:'flex',gap:10,marginBottom:10,alignItems:'flex-start'} },
            h('div', { style:{
              width:24,height:24,borderRadius:12,flexShrink:0,
              background:'linear-gradient(135deg,#FF8050,#FF5E8A)',
              color:'#fff',fontSize:12,fontWeight:800,
              display:'flex',alignItems:'center',justifyContent:'center',
            }}, i+1),
            h('div', { style:{fontSize:14,lineHeight:1.7,paddingTop:2} }, step),
          )
        )
      ),

      // 買い物メモ追加ボタン
      added
        ? h('div', { style:{
            padding:'12px',borderRadius:14,background:'#E8F5E9',
            color:'#2E7D32',fontWeight:800,fontSize:14,textAlign:'center',
          }}, '✅ 買い物メモに追加しました！')
        : h('button', {
            className: 'btn btn-purple',
            style: {boxShadow:'none'},
            onClick: addToShop,
          }, '🛒 材料を買い物メモに追加する'),
    ),

    // ── 空状態 ────────────────────────────────────────────────────────────────
    !recipe && h('div', { className:'empty', style:{marginTop:16} },
      h('span', { className:'empty-ico' }, '👆'),
      'ボタンを押すと\nランダムで1品提案します',
    ),
  );
}

function ShopTab({ shopping, setShopping, shopCats, setShopCats, members }) {
  const [text,    setText]    = useState('');
  const [memId,   setMemId]   = useState(members[0]?.id ?? '');
  const [catId,   setCatId]   = useState(shopCats[0]?.id ?? '');
  const [filter,  setFilter]  = useState('all');
  const [showMgr, setShowMgr] = useState(false);
  const [newCatNm,setNewCatNm]= useState('');
  const [newCatCl,setNewCatCl]= useState(PAL[0]);
  const inputRef = useRef(null);

  useEffect(() => { if (!memId && members[0]) setMemId(members[0].id); }, [members]);
  useEffect(() => { if (!catId && shopCats[0]) setCatId(shopCats[0].id); }, [shopCats]);

  const add = () => {
    const t = clean(text);
    if (!t || shopping.length >= LIM.items) return;
    const cid = shopCats.some(c => c.id === catId) ? catId : shopCats[0]?.id ?? '';
    setShopping(p => [...p, { id:uid(), text:t, memberId:memId, catId:cid, done:false }]);
    setText('');
    inputRef.current?.focus();
  };
  const toggle    = id => setShopping(p => p.map(i => i.id===id ? {...i,done:!i.done} : i));
  const del       = id => setShopping(p => p.filter(i => i.id!==id));
  const edit      = (id, changes) => setShopping(p => p.map(i => i.id===id ? {...i,...changes} : i));
  const clearDone = ()  => setShopping(p => p.filter(i => !i.done));
  const addCat = () => {
    const name = clean(newCatNm);
    if (!name || shopCats.length >= LIM.cats || shopCats.some(c => c.name===name)) return;
    setShopCats(p => [...p, { id:uid(), name, color:cleanClr(newCatCl) }]);
    setNewCatNm('');
  };
  const delCat = id => {
    const next = shopCats.filter(c => c.id!==id);
    if (!next.length) return;
    const fb = next[0].id;
    setShopCats(next);
    setShopping(p => p.map(i => i.catId===id ? {...i,catId:fb} : i));
    if (filter===id) setFilter('all');
    if (catId===id)  setCatId(fb);
  };

  const pending  = shopping.filter(i => !i.done);
  const done     = shopping.filter(i =>  i.done);
  const catsUsed = shopCats.filter(c => shopping.some(i => i.catId===c.id));
  const groups   = shopCats.map(cat => ({
    cat,
    pending: shopping.filter(i => i.catId===cat.id && !i.done),
    done:    shopping.filter(i => i.catId===cat.id &&  i.done),
  })).filter(g => g.pending.length+g.done.length > 0);
  const filtered = filter==='all' ? null : shopping.filter(i => i.catId===filter);

  return h(Fragment, null,
    // Summary
    h('div', { style:{display:'flex',gap:9,marginBottom:12} },
      [{label:'残り',val:pending.length,color:'#FF5E8A',icon:'📝'},
       {label:'完了',val:done.length,color:'#4CAF50',icon:'✅'}]
      .map(s => h('div',{key:s.label,style:{flex:1,background:'#fff',borderRadius:16,padding:'12px 8px',textAlign:'center',boxShadow:'0 2px 10px rgba(0,0,0,.055)'}},
        h('div',{style:{fontSize:22}},s.icon),
        h('div',{style:{fontSize:26,fontWeight:800,color:s.color}},s.val),
        h('div',{style:{fontSize:11,color:'#AAA',fontWeight:700}},s.label),
      ))
    ),
    // Add card
    h('div', { className:'card' },
      h('div', { style:{display:'flex',gap:8,marginBottom:10} },
        h('input', { ref:inputRef, className:'field', style:{margin:0,flex:1}, placeholder:'商品を追加…', maxLength:LIM.text,
          value:text, onChange:e=>setText(e.target.value), onKeyDown:e=>e.key==='Enter'&&add() }),
        h('button', { onClick:add, style:{padding:'0 18px',background:'#FF5E8A',color:'#fff',borderRadius:12,fontSize:24,fontWeight:900,boxShadow:'0 3px 12px rgba(255,94,138,.32)',flexShrink:0} }, '＋'),
      ),
      h('div', { style:{marginBottom:10} },
        h('div', { style:{fontSize:10,fontWeight:800,color:'#AAA',letterSpacing:'.8px',marginBottom:6} }, '🏪 カテゴリ'),
        h('div', { className:'chip-row' },
          shopCats.map(cat => h('button', { key:cat.id, className:'chip'+(catId===cat.id?' on':''),
            style:{color:catId===cat.id?cat.color:'#888',borderColor:catId===cat.id?cat.color:'#E5E5E5'},
            onClick:()=>setCatId(cat.id) }, cat.name))
        ),
      ),
      h('div', null,
        h('div', { style:{fontSize:10,fontWeight:800,color:'#AAA',letterSpacing:'.8px',marginBottom:6} }, '👤 担当'),
        h('div', { className:'chips' },

function ShopItem({ item, members, shopCats, onToggle, onDel, onEdit }) {
  const m = members.find(x => x.id===item.memberId) ?? members[0];
  const cat = shopCats.find(c => c.id===item.catId) ?? shopCats[0];
  const [editing,    setEditing]    = useState(false);
  const [editText,   setEditText]   = useState(item.text);
  const [editCatId,  setEditCatId]  = useState(item.catId);
  const [editMemId,  setEditMemId]  = useState(item.memberId);
  const inputRef = useRef(null);

  const startEdit = e => {
    e.stopPropagation();
    setEditText(item.text); setEditCatId(item.catId); setEditMemId(item.memberId);
    setEditing(true);
    setTimeout(() => inputRef.current?.focus(), 80);
  };
  const saveEdit = () => {
    const t = editText.trim();
    if (t) onEdit(item.id, { text:t, catId:editCatId, memberId:editMemId });
    setEditing(false);
  };
  const cancelEdit = () => setEditing(false);

  if (editing) return h('div', { className:'shop-item', style:{flexDirection:'column',alignItems:'stretch',gap:8,padding:'10px 0'} },
    h('input', { ref:inputRef, className:'field', style:{margin:0,fontSize:15},
      value:editText, onChange:e=>setEditText(e.target.value),
      onKeyDown:e=>{ if(e.key==='Enter') saveEdit(); if(e.key==='Escape') cancelEdit(); }
    }),
    // カテゴリ選択
    h('div', { style:{fontSize:10,fontWeight:800,color:'#AAA',letterSpacing:'.8px',marginBottom:4} }, '🏪 カテゴリ'),
    h('div', { style:{display:'flex',gap:6,flexWrap:'wrap',marginBottom:6} },
      shopCats.map(c => h('button', { key:c.id, onClick:()=>setEditCatId(c.id),
        style:{
          padding:'5px 11px',borderRadius:20,border:'2px solid',fontSize:12,fontWeight:700,
          borderColor: editCatId===c.id ? c.color : '#E5E5E5',
          background:  editCatId===c.id ? c.color+'22' : '#fff',
          color:       editCatId===c.id ? c.color : '#AAA',
          transition:'all .12s',
        }
      }, c.name))
    ),
    // 担当者選択
    h('div', { style:{fontSize:10,fontWeight:800,color:'#AAA',letterSpacing:'.8px',marginBottom:4} }, '👤 担当'),
    h('div', { style:{display:'flex',gap:6,flexWrap:'wrap',marginBottom:6} },
      members.map(m => h('button', { key:m.id, onClick:()=>setEditMemId(m.id),
        style:{
          padding:'5px 11px',borderRadius:20,border:'2px solid',fontSize:12,fontWeight:700,
          borderColor: editMemId===m.id ? m.color : '#E5E5E5',
          background:  editMemId===m.id ? m.color+'22' : '#fff',
          color:       editMemId===m.id ? m.color : '#AAA',
          transition:'all .12s',
        }
      }, m.emoji+' '+m.name))
    ),
    h('div', { style:{display:'flex',gap:8} },
      h('button', { onClick:saveEdit,
        style:{flex:1,padding:'9px',borderRadius:12,background:'#FF5E8A',color:'#fff',fontWeight:800,fontSize:13} },
        '✓ 保存'),
      h('button', { onClick:cancelEdit,
        style:{padding:'9px 16px',borderRadius:12,background:'#F5F5F5',color:'#AAA',fontWeight:800,fontSize:13} },
        '✕'),
    ),
  );

  return h('div', { className:'shop-item'+(item.done?' done':'') },
    h('button', { className:'chk'+(item.done?' on':''), onClick:()=>onToggle(item.id) },
      item.done && h('span', { className:'chk-icon' }, '✓')),
    h('span', { style:{fontSize:19,flexShrink:0} }, m?.emoji),
    h('span', { className:'shop-txt'+(item.done?' done':''),
      onClick: item.done ? undefined : startEdit,
      style:{ cursor: item.done ? 'default' : 'pointer', flex:1 },
      title: item.done ? '' : 'タップして編集',
    }, item.text),
    cat && !item.done && h('button', { onClick:startEdit,
      style:{
        fontSize:10,fontWeight:800,padding:'2px 8px',borderRadius:10,

        flexShrink:0, whiteSpace:'nowrap',

    h('span', { className:'shop-who', style:{color:m?.color} }, m?.name),
    h('button', { className:'del', onClick:()=>onDel(item.id) }, '✕'),

}
// ═══════════════════════ CALENDAR ════════════════════════════════════════════
function CalTab({ events, setEvents, members }) {
  const [cur,     setCur]     = useState(new Date());
  const [sel,     setSel]     = useState(null);
  const [show,    setShow]    = useState(false);
  const [form, setForm] = useState({ title:'', date:'', time:'', allDay:true, memberId:members[0]?.id??'', note:'' });
  const sf = k => v => setForm(p => ({...p,[k]:v}));
  const now = new Date();
  const yr=cur.getFullYear(), mo=cur.getMonth();
  const fd=new Date(yr,mo,1).getDay(), dim=new Date(yr,mo+1,0).getDate();

  // ── 過去の予定を自動削除（30日以上前） ────────────────────────────────────
  useEffect(() => {
    const cutoff = new Date(); cutoff.setDate(cutoff.getDate() - 90);
    const cutoffStr = `${cutoff.getFullYear()}-${String(cutoff.getMonth()+1).padStart(2,'0')}-${String(cutoff.getDate()).padStart(2,'0')}`;
    setEvents(p => p.filter(e => e.date >= cutoffStr));
  }, []);

  const addEv = () => {
    const title=clean(form.title), date=cleanDate(form.date);
    if (!title||!date||events.length>=LIM.events) return;
    setEvents(p=>[...p,{id:uid(),title,date,time:form.allDay?'':cleanTime(form.time),allDay:Boolean(form.allDay),memberId:form.memberId,note:clean(form.note,LIM.note)}]);
    setForm({title:'',date:'',time:'',allDay:true,memberId:members[0]?.id??'',note:''});
    setShow(false);
  };
  const delEv  = id => setEvents(p => p.filter(e => e.id!==id));
  const editEv = (id, changes) => setEvents(p => p.map(e => e.id===id ? {...e,...changes} : e));

  const dayEvs = d => {
    const ds=`${yr}-${String(mo+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    return events.filter(e=>e.date===ds).sort((a,b)=>{
      if(a.allDay&&!b.allDay)return -1;if(!a.allDay&&b.allDay)return 1;
      return(a.time||'').localeCompare(b.time||'');
    });
  };

  // 翌日の予定のみ
  const tomorrow = new Date(now); tomorrow.setDate(tomorrow.getDate()+1);
  const tomorrowStr = `${tomorrow.getFullYear()}-${String(tomorrow.getMonth()+1).padStart(2,'0')}-${String(tomorrow.getDate()).padStart(2,'0')}`;
  const tmrEvents = events.filter(e => e.date === tomorrowStr).sort((a,b)=>{
    if(a.allDay&&!b.allDay)return -1;if(!a.allDay&&b.allDay)return 1;
    return(a.time||'').localeCompare(b.time||'');
  });

  return h(Fragment,null,
    h('div',{className:'cal-nav'},
      h('button',{className:'cal-arr',onClick:()=>setCur(new Date(yr,mo-1))},'‹'),
      h('div',{className:'cal-mo'},yr+'年 '+(mo+1)+'月'),
      h('button',{className:'cal-arr',onClick:()=>setCur(new Date(yr,mo+1))},'›'),
    ),
    h('div',{className:'cal-grid'},
      h('div',{className:'cal-head'},['日','月','火','水','木','金','土'].map((d,i)=>h('div',{key:d,className:'cal-dow'+(i===0?' s':i===6?' sa':'')},d))),
      h('div',{className:'cal-body'},
        Array(fd).fill(null).map((_,i)=>h('div',{key:'e'+i,className:'cal-cell empty'})),
        Array(dim).fill(null).map((_,i)=>{
          const d=i+1,dow=(fd+i)%7,devs=dayEvs(d);
          const isToday=now.getDate()===d&&now.getMonth()===mo&&now.getFullYear()===yr;
          return h('div',{key:d,className:'cal-cell'+(sel===d?' sel':''),onClick:()=>setSel(sel===d?null:d)},
            h('div',{className:'cal-num'+(isToday?' today':dow===0?' s':dow===6?' sa':'')},d),
            devs.length>0&&h('div',{className:'cal-dots'},devs.slice(0,4).map(ev=>{
              const m=members.find(x=>x.id===ev.memberId)??members[0];
              return h('div',{key:ev.id,className:'cal-dot',style:{background:m?.color??'#ccc'}});
            })),
          );
        }),
      ),
    ),
    // 日付タップ → その日の予定
    sel!==null&&h('div',{className:'card su'},
      h('div',{style:{fontWeight:800,color:'#FF5E8A',marginBottom:10,fontSize:15}},(mo+1)+'月'+sel+'日の予定'),
      dayEvs(sel).length===0
        ? h('div',{style:{color:'#BBB',fontSize:13,padding:'6px 0'}},'予定はありません')
        : dayEvs(sel).map(ev=>h(EvRow,{key:ev.id,ev,members,onDel:delEv,onEdit:editEv})),
      h('button',{style:{marginTop:10,padding:'7px 16px',background:'#FFF0F5',border:'2px solid #FF5E8A',color:'#FF5E8A',borderRadius:10,fontSize:13,fontWeight:800},
        onClick:()=>{const ds=`${yr}-${String(mo+1).padStart(2,'0')}-${String(sel).padStart(2,'0')}`;sf('date')(ds);setShow(true)}},'＋ この日に追加'),
    ),
    h('button',{className:'btn btn-purple',style:{marginBottom:12},onClick:()=>setShow(p=>!p)},show?'✕ 閉じる':'＋ 予定を追加する'),
    show&&h('div',{className:'card fi'},
      h('div',{className:'card-label'},'新しい予定'),
      h('input',{className:'field',placeholder:'タイトル',maxLength:LIM.text,value:form.title,onChange:e=>sf('title')(e.target.value)}),
      h('input',{className:'field',type:'date',value:form.date,onChange:e=>sf('date')(e.target.value)}),
      h('div',{style:{display:'flex',alignItems:'center',gap:10,marginBottom:10}},
        h('button',{className:'toggle'+(form.allDay?' on':''),onClick:()=>setForm(p=>({...p,allDay:!p.allDay,time:''}))},form.allDay?'✓ 終日':'終日'),
        !form.allDay?h('input',{className:'field',type:'time',style:{margin:0,flex:1},value:form.time,onChange:e=>sf('time')(e.target.value)}):h('span',{style:{fontSize:12,color:'#BBB'}},'→ タップして時間を指定'),
      ),
      h('div',{style:{marginBottom:10}},
        h('div',{style:{fontSize:10,fontWeight:800,color:'#AAA',letterSpacing:'.8px',marginBottom:6}},'👤 誰の予定？'),
        h('div',{className:'chips'},members.map(m=>h('button',{key:m.id,className:'m-chip',style:{borderColor:form.memberId===m.id?m.color:'#E5E5E5',background:form.memberId===m.id?m.color+'1A':'#fff',color:form.memberId===m.id?m.color:'#666'},onClick:()=>sf('memberId')(m.id)},m.emoji+' '+m.name))),
      ),
      h('input',{className:'field',placeholder:'メモ（任意）',maxLength:LIM.note,value:form.note,onChange:e=>sf('note')(e.target.value)}),
      h('button',{className:'btn btn-grad',onClick:addEv},'追加する'),
    ),
    // 明日の予定
    h('div',{className:'card'},
      h('div',{style:{display:'flex',alignItems:'center',marginBottom:8}},
        h('div',{className:'card-label',style:{margin:0,flex:1}},'明日の予定'),
        h('span',{style:{fontSize:11,color:'#AAA',fontWeight:700}},
          `${tomorrow.getMonth()+1}/${tomorrow.getDate()}（${'日月火水木金土'[tomorrow.getDay()]}）`),
      ),
      tmrEvents.length===0
        ? h('div',{className:'empty',style:{padding:'12px 0'}},h('span',{className:'empty-ico'},'📅'),'明日の予定はありません')
        : tmrEvents.map(ev=>h(EvRow,{key:ev.id,ev,members,onDel:delEv,onEdit:editEv,compact:true})),
    ),
  );
}

const BCAT_ICONS = {食費:'🍽',日用品:'🧴',交通費:'🚃',娯楽:'🎮',医療:'💊',教育:'📚',その他:'📦'};

function DonutChart({ data, total, selected, onSelect }) {
  // data: [{cat, val, color}]
  const size = 200, cx = 100, cy = 100, r = 72, inner = 44;
  let angle = -Math.PI / 2;
  const slices = data.map(d => {
    const start = angle;
    const sweep = (d.val / total) * 2 * Math.PI;
    angle += sweep;
    const end = angle;
    const large = sweep > Math.PI ? 1 : 0;
    const x1 = cx + r * Math.cos(start), y1 = cy + r * Math.sin(start);
    const x2 = cx + r * Math.cos(end),   y2 = cy + r * Math.sin(end);
    const ix1 = cx + inner * Math.cos(start), iy1 = cy + inner * Math.sin(start);
    const ix2 = cx + inner * Math.cos(end),   iy2 = cy + inner * Math.sin(end);
    const path = `M${ix1},${iy1} L${x1},${y1} A${r},${r} 0 ${large},1 ${x2},${y2} L${ix2},${iy2} A${inner},${inner} 0 ${large},0 ${ix1},${iy1} Z`;
    return { ...d, path, midAngle: start + sweep / 2 };
  });
  const selData = selected ? data.find(d => d.cat === selected) : null;

  return h('svg', { viewBox:`0 0 ${size} ${size}`, style:{width:'100%',maxWidth:220,display:'block',margin:'0 auto',cursor:'pointer'} },
    slices.map(s => {
      const isSelected = selected === s.cat;
      const scale = isSelected ? 1.06 : 1;
      return h('path', {
        key: s.cat, d: s.path,
        fill: s.color,
        opacity: selected && !isSelected ? 0.45 : 1,
        transform: `translate(${cx},${cy}) scale(${scale}) translate(${-cx},${-cy})`,
        style: { transition: 'all .2s', filter: isSelected ? 'drop-shadow(0 3px 8px rgba(0,0,0,.18))' : 'none' },
        onClick: () => onSelect(selected === s.cat ? null : s.cat),
      });
    }),
    // Center text
    h('text', { x: cx, y: cy - 8, textAnchor:'middle', style:{fontSize:11,fill:'#AAA',fontWeight:700} },
      selData ? selData.cat : '支出合計'),
    h('text', { x: cx, y: cy + 12, textAnchor:'middle', style:{fontSize:15,fill:'#333',fontWeight:800} },
      '¥' + (selData ? selData.val : total).toLocaleString()),
    selData && h('text', { x: cx, y: cy + 28, textAnchor:'middle', style:{fontSize:11,fill:selData.color,fontWeight:700} },
      (selData.val/total*100).toFixed(0) + '%'),
  );
}

function BudgetTab({ budget, setBudget, members }) {
  const now = new Date();
  const [moOffset, setMoOffset] = useState(0);
  const [show,   setShow]   = useState(false);
  const [filter, setFilter] = useState('all');
  const [selCat, setSelCat] = useState(null);
  const [form,   setForm]   = useState({
    title:'', amount:'', category:'食費',
    memberId: members[0]?.id ?? '',
    date: today(), type: 'expense',
  });
  const sf = k => v => setForm(p => ({ ...p, [k]: v }));

  useEffect(() => { if (!form.memberId && members[0]) sf('memberId')(members[0].id); }, [members]);

  const add = () => {
    const title = (form.title || '').trim();
    if (!title) { alert('内容を入力してください'); return; }
    const rawAmt = String(form.amount).replace(/[^0-9]/g, '');
    const amount = parseInt(rawAmt, 10);
    if (!amount || amount <= 0) { alert('金額を入力してください'); return; }
    const cat      = BCATS.includes(form.category) ? form.category : 'その他';
    const type     = form.type === 'income' ? 'income' : 'expense';
    const memberId = form.memberId || members[0]?.id || '';
    const date     = /^\d{4}-\d{2}-\d{2}$/.test(form.date) ? form.date : today();
    setBudget(p => [...p, { id:uid(), title, amount, category:cat, memberId, date, type }]);
    setForm(f => ({ ...f, title:'', amount:'', date:today() }));
    setShow(false);
  };

  const del = id => setBudget(p => p.filter(b => b.id !== id));

  // ── ローカル日付でYYYY-MM取得（タイムゾーンバグ修正）────────────────────────
  const localYM = (y, m) => `${y}-${String(m+1).padStart(2,'0')}`;

  // Month navigation
  const viewDate = new Date(now.getFullYear(), now.getMonth() + moOffset, 1);
  const viewM    = localYM(viewDate.getFullYear(), viewDate.getMonth());
  const moLabel  = `${viewDate.getFullYear()}年${viewDate.getMonth()+1}月`;

  // 前月
  const prevDate = new Date(viewDate.getFullYear(), viewDate.getMonth() - 1, 1);
  const prevM    = localYM(prevDate.getFullYear(), prevDate.getMonth());

  const monthly  = budget.filter(b => b.date.startsWith(viewM));
  const prevMon  = budget.filter(b => b.date.startsWith(prevM));

  const totExp   = monthly.filter(b => b.type==='expense').reduce((s,b) => s+b.amount, 0);
  const totInc   = monthly.filter(b => b.type==='income').reduce((s,b) => s+b.amount, 0);
  const bal      = totInc - totExp;
  const prevExp  = prevMon.filter(b => b.type==='expense').reduce((s,b) => s+b.amount, 0);
  const prevInc  = prevMon.filter(b => b.type==='income').reduce((s,b) => s+b.amount, 0);
  const diffExp  = totExp - prevExp;  // + なら増加
  const diffInc  = totInc - prevInc;

  // メンバー別支出
  const memberExp = members.map(m => ({
    ...m,
    val: monthly.filter(b => b.type==='expense' && b.memberId===m.id).reduce((s,b) => s+b.amount, 0),
  })).filter(m => m.val > 0);

  // Donut data
  const donutData = BCATS.map(cat => ({
    cat, color: BCLR[cat],
    val: monthly.filter(b => b.type==='expense' && b.category===cat).reduce((s,b) => s+b.amount, 0),
  })).filter(d => d.val > 0);

  // List
  const listItems = [...budget]
    .filter(b => filter==='all' ? true : b.type===filter)
    .filter(b => b.date.startsWith(viewM))
    .sort((a,b) => b.date.localeCompare(a.date));

  const fmt     = v => '¥' + v.toLocaleString();
  const fmtDiff = v => (v > 0 ? '▲' : v < 0 ? '▼' : '－') + '¥' + Math.abs(v).toLocaleString();

  return h(Fragment, null,

    // ── Month nav ────────────────────────────────────────────────────────────
    h('div', { style:{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:12} },
      h('button', { className:'cal-arr', onClick:()=>setMoOffset(o=>o-1) }, '‹'),
      h('div', { style:{fontWeight:800,fontSize:17} }, moLabel),
      h('button', { className:'cal-arr', onClick:()=>setMoOffset(o=>o+1), style:{opacity:moOffset>=0?.35:1} }, '›'),
    ),

    // ── Summary cards ────────────────────────────────────────────────────────
    h('div', { className:'sum-grid', style:{marginBottom:8} },
      [
        {label:'収入', val:totInc, color:'#4CAF50', icon:'📈', diff:diffInc, diffGood: diffInc>=0},
        {label:'支出', val:totExp, color:'#FF5E8A', icon:'📉', diff:diffExp, diffGood: diffExp<=0},
        {label:'収支', val:bal,    color:bal>=0?'#4CAF50':'#FF5E8A', icon:'💹', diff:null},
      ].map(s => h('div', { key:s.label, className:'sum-card' },
        h('div', { style:{fontSize:22,marginBottom:2} }, s.icon),
        h('div', { style:{fontSize:10,color:'#AAA',fontWeight:700,marginBottom:2} }, s.label),
        h('div', { style:{fontSize:13,fontWeight:800,color:s.color} },
          (s.val < 0 ? '-' : '') + fmt(Math.abs(s.val))
        ),
        s.diff !== null && prevExp > 0 && h('div', {
          style:{fontSize:9,fontWeight:800,marginTop:2,
            color: s.diffGood ? '#4CAF50' : '#FF5E8A'}
        }, fmtDiff(s.diff) + ' 前月比'),
      ))
    ),

    // ── メンバー別支出 ─────────────────────────────────────────────────────────
    memberExp.length > 1 && h('div', { className:'card', style:{marginBottom:12, padding:'12px 14px'} },
      h('div', { className:'card-label' }, '👤 メンバー別支出'),
      h('div', { style:{display:'flex',gap:8,flexWrap:'wrap'} },
        memberExp.sort((a,b)=>b.val-a.val).map(m =>
          h('div', { key:m.id, style:{
            flex:'1 1 auto', minWidth:80,
            background: m.color+'14', borderRadius:14,
            padding:'10px 12px', textAlign:'center',
            border:`2px solid ${m.color}33`,
          }},
            h('div', { style:{fontSize:22} }, m.emoji),
            h('div', { style:{fontSize:11,fontWeight:800,color:m.color,marginTop:2} }, m.name),
            h('div', { style:{fontSize:13,fontWeight:800,color:'#333',marginTop:2} }, fmt(m.val)),
            h('div', { style:{fontSize:10,color:'#AAA'} },
              totExp > 0 ? (m.val/totExp*100).toFixed(0)+'%' : ''),
          )
        )
      ),
    ),

    // ── Donut chart ──────────────────────────────────────────────────────────
    totExp > 0 && h('div', { className:'card', style:{marginBottom:12} },
      h('div', { className:'card-label' }, '支出の内訳（タップで詳細）'),
      h(DonutChart, { data:donutData, total:totExp, selected:selCat, onSelect:setSelCat }),
      h('div', { style:{display:'flex',flexWrap:'wrap',gap:'6px 12px',marginTop:10,justifyContent:'center'} },
        donutData.map(d => h('button', {
          key: d.cat,
          onClick: () => setSelCat(s => s===d.cat ? null : d.cat),
          style:{
            display:'flex',alignItems:'center',gap:5,padding:'4px 10px',
            borderRadius:20,border:'2px solid',fontSize:12,fontWeight:700,
            borderColor: selCat===d.cat ? d.color : '#E5E5E5',
            background:  selCat===d.cat ? d.color+'18' : '#fff',
            color:       selCat===d.cat ? d.color : '#888',
            transition:'all .15s',
          }
        }, BCAT_ICONS[d.cat]+' '+d.cat))
      ),
    ),

    // ── Add button ───────────────────────────────────────────────────────────
    h('button', {
      className:'btn btn-purple', style:{marginBottom:12},
      onClick:()=>setShow(p=>!p),
    }, show ? '✕ 閉じる' : '＋ 収支を記録する'),

    // ── Add form ─────────────────────────────────────────────────────────────
    show && h('div', { className:'card fi' },
      // Type toggle
      h('div', { className:'type-row' },
        [{k:'expense',label:'💸 支出'},{k:'income',label:'💰 収入'}].map(t =>
          h('button', { key:t.k,
            className:'type-btn'+(form.type===t.k?' on':''),
            onClick:()=>sf('type')(t.k),
          }, t.label)
        )
      ),
      // Title
      h('input', {
        className:'field', placeholder:'内容（例：スーパー、電車代）',
        maxLength:LIM.text, value:form.title,
        onChange:e=>sf('title')(e.target.value),
      }),
      // Amount — big tappable input
      h('div', { style:{position:'relative',marginBottom:10} },
        h('span', { style:{position:'absolute',left:14,top:'50%',transform:'translateY(-50%)',fontSize:18,fontWeight:800,color:'#CCC'} }, '¥'),
        h('input', {
          className:'field',
          style:{paddingLeft:30,marginBottom:0,fontSize:20,fontWeight:800,letterSpacing:1},
          type:'number', inputMode:'numeric', placeholder:'0',
          min:0, max:LIM.amount, value:form.amount,
          onChange:e=>sf('amount')(e.target.value),
        }),
      ),
      // Category — icon buttons
      h('div', { style:{marginBottom:10} },
        h('div', { style:{fontSize:10,fontWeight:800,color:'#AAA',letterSpacing:'.8px',marginBottom:8} }, 'カテゴリ'),
        h('div', { style:{display:'flex',flexWrap:'wrap',gap:8} },
          BCATS.map(c => h('button', { key:c,
            onClick:()=>sf('category')(c),
            style:{
              padding:'8px 12px',borderRadius:14,border:'2px solid',fontSize:13,fontWeight:700,
              display:'flex',alignItems:'center',gap:5,
              borderColor: form.category===c ? BCLR[c] : '#E5E5E5',
              background:  form.category===c ? BCLR[c]+'22' : '#fff',
              color:       form.category===c ? BCLR[c] : '#888',
              transition:'all .15s',
            }
          }, BCAT_ICONS[c]+' '+c))
        ),
      ),
      // Date
      h('input', { className:'field', type:'date', value:form.date, onChange:e=>sf('date')(e.target.value) }),
      // Member
      h('div', { style:{marginBottom:10} },
        h('div', { style:{fontSize:10,fontWeight:800,color:'#AAA',letterSpacing:'.8px',marginBottom:6} }, '👤 誰が？'),
        h('div', { className:'chips' },
          members.map(m => h('button', { key:m.id, className:'m-chip',
            style:{borderColor:form.memberId===m.id?m.color:'#E5E5E5',background:form.memberId===m.id?m.color+'1A':'#fff',color:form.memberId===m.id?m.color:'#666'},
            onClick:()=>sf('memberId')(m.id),
          }, m.emoji+' '+m.name))
        ),
      ),
      h('button', { className:'btn btn-grad', onClick:add }, '追加する'),
    ),

    // ── Filter ───────────────────────────────────────────────────────────────
    h('div', { className:'chip-row', style:{marginBottom:10} },
      [{k:'all',l:'すべて'},{k:'expense',l:'💸 支出'},{k:'income',l:'💰 収入'}].map(f =>
        h('button', { key:f.k, className:'chip'+(filter===f.k?' on':''),
          style:{color:filter===f.k?'#333':'#888',borderColor:filter===f.k?'#333':'#E5E5E5',background:filter===f.k?'#EEE':'#fff'},
          onClick:()=>setFilter(f.k),
        }, f.l)
      )
    ),

    // ── List ─────────────────────────────────────────────────────────────────
    h('div', { className:'card' },
      listItems.length === 0
        ? h('div', { className:'empty', style:{padding:'16px 0'} },
            h('span', { className:'empty-ico' }, '💳'), 'この月の記録はありません')
        : listItems.map(b => {
            const m = members.find(x => x.id===b.memberId) ?? members[0];
            return h('div', { key:b.id, className:'b-row' },
              h('div', { className:'b-icon', style:{background:BCLR[b.category]+'28',fontSize:20} },
                BCAT_ICONS[b.category]),
              h('div', { style:{flex:1,minWidth:0} },
                h('div', { style:{fontSize:14,fontWeight:700} }, b.title),
                h('div', { style:{fontSize:11,color:'#AAA',marginTop:1,display:'flex',gap:6,alignItems:'center'} },
                  h('span', null, b.date),
                  h('span', { style:{color:BCLR[b.category],fontWeight:700} }, BCAT_ICONS[b.category]+b.category),
                  h('span', { style:{color:m?.color,fontWeight:700} }, m?.emoji+m?.name),
                ),
              ),
              h('div', { style:{fontWeight:800,color:b.type==='income'?'#4CAF50':'#FF5E8A',fontSize:15,flexShrink:0,marginRight:4} },
                (b.type==='income' ? '+' : '-') + fmt(b.amount)),
              h('button', { className:'del', onClick:()=>del(b.id) }, '✕'),
            );
          })
    ),
  );
}

// ═══════════════════════ BOARD (SWIPE) ═══════════════════════════════════════
function BoardTab({ notes, setNotes, members }) {
  const [text,    setText]    = useState('');
  const [memId,   setMemId]   = useState(members[0]?.id ?? '');
  const [showArc, setShowArc] = useState(false);
  const [showPost,setShowPost]= useState(false);
  const [idx, setIdx] = useState(0);

  useEffect(() => { if (!memId && members[0]) setMemId(members[0].id); }, [members]);

  const unread   = [...notes].filter(n => !n.archived).sort((a,b) => b.ts - a.ts);
  const archived = [...notes].filter(n =>  n.archived).sort((a,b) => b.ts - a.ts);
  const safeIdx = unread.length > 0 ? idx % unread.length : 0;
  const top = unread[safeIdx] ?? null;

  const fmtTime = ts => {
    const d = new Date(ts), now = new Date(), diff = (now - d) / 1000;
    if (diff < 60)    return 'たった今';
    if (diff < 3600)  return Math.floor(diff/60)+'分前';
    if (diff < 86400) return Math.floor(diff/3600)+'時間前';
    return (d.getMonth()+1)+'/'+d.getDate();
  };

  const post = () => {
    const t = clean(text, 200);
    if (!t || notes.length >= 300) return;
    setNotes(p => [...p, { id:uid(), text:t, memberId:memId, ts:Date.now(), archived:false }]);
    setText(''); setShowPost(false);
  };

  const goNext = () => { if (unread.length <= 1) return; setIdx(i => (i+1) % unread.length); };
  const archiveCurrent = () => {
    if (!top) return;
    setNotes(p => p.map(n => n.id===top.id ? {...n, archived:true} : n));
  };

  const cardRef = useRef(null), dragState = useRef(null);
  const labelKeepRef = useRef(null), labelDoneRef = useRef(null);
  const onStart = cx => { dragState.current = { startX:cx, dx:0 }; };
  const onMove  = cx => {
    if (!dragState.current || !cardRef.current) return;
    const dx = cx - dragState.current.startX; dragState.current.dx = dx;
    cardRef.current.style.transform = `translateX(${dx}px) rotate(${dx*0.06}deg)`;
    const pct = Math.min(Math.abs(dx)/80, 1);
    if (labelKeepRef.current) labelKeepRef.current.style.opacity = dx < -18 ? pct : 0;
    if (labelDoneRef.current) labelDoneRef.current.style.opacity = dx >  18 ? pct : 0;
  };
  const onEnd = () => {
    if (!dragState.current || !cardRef.current) return;
    const dx = dragState.current.dx; dragState.current = null;
    if (labelKeepRef.current) labelKeepRef.current.style.opacity = 0;
    if (labelDoneRef.current) labelDoneRef.current.style.opacity = 0;
    if (Math.abs(dx) > 80) {
      const dir = dx > 0 ? 1 : -1;
      cardRef.current.style.transition = 'transform .28s ease, opacity .28s';
      cardRef.current.style.transform  = `translateX(${dir*440}px) rotate(${dir*16}deg)`;
      cardRef.current.style.opacity    = '0';
      setTimeout(() => {
        if (cardRef.current) { cardRef.current.style.transition=''; cardRef.current.style.transform=''; cardRef.current.style.opacity=''; }
        if (dx > 0) archiveCurrent(); else goNext();
      }, 280);
    } else {
      cardRef.current.style.transition = 'transform .25s cubic-bezier(.25,1.4,.5,1)';
      cardRef.current.style.transform  = '';
      setTimeout(() => { if (cardRef.current) cardRef.current.style.transition=''; }, 260);
    }
  };
  const onTouchStart = e => onStart(e.touches[0].clientX);
  const onTouchMove  = e => { e.preventDefault(); onMove(e.touches[0].clientX); };
  const onMouseDown  = e => {
    onStart(e.clientX);
    const mv = e2 => onMove(e2.clientX);
    const up = () => { onEnd(); window.removeEventListener('mousemove',mv); window.removeEventListener('mouseup',up); };
    window.addEventListener('mousemove', mv); window.addEventListener('mouseup', up);
  };

  return h(Fragment, null,
    h('div', { style:{display:'flex',alignItems:'center',gap:10,marginBottom:14} },
      h('div', { style:{flex:1,fontSize:13,color:'#AAA',fontWeight:700} },
        unread.length > 0 ? `未読 ${unread.length}件` : 'すべて読みました！'),
      h('button', { style:{padding:'9px 18px',background:'linear-gradient(135deg,#FF8050,#FF5E8A)',color:'#fff',borderRadius:14,fontSize:14,fontWeight:800,boxShadow:'0 3px 12px rgba(255,94,138,.3)'},
        onClick:()=>setShowPost(p=>!p) }, showPost ? '✕ 閉じる' : '✏️ 投稿する'),
    ),
    showPost && h('div', { className:'board-post-card fi', style:{marginBottom:12} },
      h('textarea', { className:'field', style:{minHeight:90,resize:'none',marginBottom:10},
        placeholder:'家族へのメッセージを書いてください…', maxLength:200, value:text, onChange:e=>setText(e.target.value) }),
      h('div', { style:{marginBottom:10} },
        h('div', { style:{fontSize:10,fontWeight:800,color:'#AAA',letterSpacing:'.8px',marginBottom:6} }, '👤 投稿者'),
        h('div', { className:'chips' },
          members.map(m => h('button', { key:m.id, className:'m-chip',
            style:{borderColor:memId===m.id?m.color:'#E5E5E5',background:memId===m.id?m.color+'1A':'#fff',color:memId===m.id?m.color:'#666'},
            onClick:()=>setMemId(m.id) }, m.emoji+' '+m.name))
        ),
      ),
      h('button', { className:'btn btn-grad', style:{boxShadow:'none'}, onClick:post, disabled:!text.trim() }, '投稿する'),
    ),
    h('div', { className:'board-stack' },
      unread.length > 2 && h('div', { style:{position:'absolute',inset:0,background:'#fff',borderRadius:24,transform:'translateY(12px) scale(.88)',boxShadow:'0 4px 16px rgba(0,0,0,.08)'} }),
      unread.length > 1 && h('div', { style:{position:'absolute',inset:0,background:'#fff',borderRadius:24,transform:'translateY(6px) scale(.94)',boxShadow:'0 4px 20px rgba(0,0,0,.10)'} }),
      top ? h('div', { key:top.id, ref:cardRef, className:'board-card', onTouchStart, onTouchMove, onTouchEnd:onEnd, onMouseDown },
        h('span', { ref:labelKeepRef, className:'swipe-label keep' }, '← あとで'),
        h('span', { ref:labelDoneRef, className:'swipe-label done' }, '既読 →'),
        h('div', { className:'board-who' },
          h('div', { className:'board-avatar', style:{background:(members.find(m=>m.id===top.memberId)?.color??'#ccc')+'22'} },
            members.find(m=>m.id===top.memberId)?.emoji ?? '👤'),
          h('div', null, h('div', { className:'board-name' }, members.find(m=>m.id===top.memberId)?.name ?? '')),
          h('div', { className:'board-time' }, fmtTime(top.ts)),
        ),
        unread.length > 1 && h('div', { style:{fontSize:11,color:'#CCC',fontWeight:700,marginBottom:8} }, `${safeIdx+1} / ${unread.length}`),
        h('div', { className:'board-body' }, top.text),
        h('div', { className:'board-hint' },
          h('span', { className:'hint-left' }, '← あとで'),
          h('span', { className:'hint-right' }, '既読 →'),
        ),
      ) : h('div', { className:'board-empty' },
        h('div', { className:'board-empty-ico' }, notes.length > 0 ? '🎉' : '📭'),
        notes.length > 0 ? 'すべて読みました！' : 'メッセージはありません',
      ),
    ),
    unread.length > 1 && h('div', { className:'board-count' },
      Array(Math.min(unread.length,7)).fill(null).map((_,i) =>
        h('div', { key:i, className:'board-pip'+(i===safeIdx%Math.min(unread.length,7)?' on':'') })
      )
    ),
    top && h('div', { style:{display:'flex',gap:10,width:'100%',marginTop:8} },
      h('button', { style:{flex:1,padding:'13px',borderRadius:14,background:'#E8F0FF',color:'#3B5BDB',fontSize:14,fontWeight:800,border:'none'}, onClick:goNext }, '← あとで'),
      h('button', { style:{flex:1,padding:'13px',borderRadius:14,background:'#FFF0F5',color:'#FF5E8A',fontSize:14,fontWeight:800,border:'none'}, onClick:archiveCurrent }, '既読 →'),
    ),
    archived.length > 0 && h(Fragment, null,
      h('button', { className:'btn btn-ghost', style:{marginTop:16,width:'100%'}, onClick:()=>setShowArc(p=>!p) },
        showArc ? '▲ 既読を隠す' : `▼ 既読を見る（${archived.length}件）`),
      showArc && h('div', { className:'board-archived card fi' },
        h('div', { className:'card-label' }, '既読メッセージ'),
        archived.map(n => {
          const m = members.find(x=>x.id===n.memberId)??members[0];
          return h('div', { key:n.id, className:'arc-row' },
            h('div', { style:{fontSize:22,flexShrink:0} }, m?.emoji),
            h('div', { style:{flex:1,minWidth:0} },
              h('div', { style:{fontSize:14,lineHeight:1.5,color:'#555'} }, n.text),
              h('div', { style:{fontSize:11,color:'#BBB',marginTop:3} }, m?.name+' · '+fmtTime(n.ts)),
            ),
            h('button', { style:{color:'#DDD',fontSize:13,padding:'2px 5px',flexShrink:0}, title:'未読に戻す',
              onClick:()=>setNotes(p=>p.map(x=>x.id===n.id?{...x,archived:false}:x)) }, '↩'),
            h('button', { style:{color:'#DDD',fontSize:15,padding:'2px 4px',flexShrink:0},
              onClick:()=>setNotes(p=>p.filter(x=>x.id!==n.id)) }, '✕'),
          );
        })
      ),
    ),
  );
}

// ═══════════════════════ SETTINGS ════════════════════════════════════════════
function CfgTab({ members, setMembers, onReset }) {
  const [showAdd, setShowAdd] = useState(false);
  const [newName, setNewName] = useState('');
  const [newEmoji,setNewEmoji]= useState(EMOJIS[0]);
  const [newClr,  setNewClr]  = useState(PAL[0]);
  const addM = () => {
    const name=clean(newName,20);
    if(!name||members.length>=LIM.members)return;
    setMembers(p=>[...p,{id:uid(),name,emoji:newEmoji,color:cleanClr(newClr)}]);
    setNewName('');setShowAdd(false);
  };
  const delM = id => { if(members.length<=1)return; setMembers(p=>p.filter(m=>m.id!==id)); };

  return h(Fragment, null,
    h('div',{className:'box box-green'},
      h('strong',null,'🟢 リアルタイム同期中'),
      'Firebaseで全員のデータが自動同期されます。同じURLを開くだけで家族全員が最新データを見られます。'
    ),
    h('div',{className:'card'},
      h('div',{className:'card-label'},'家族メンバー'),
      members.map(m=>h('div',{key:m.id,className:'m-row'},
        h('span',{style:{fontSize:24}},m.emoji),
        h('div',{style:{flex:1}},h('div',{style:{fontSize:15,fontWeight:700}},m.name)),
        h('div',{style:{width:13,height:13,borderRadius:'50%',background:m.color}}),
        h('button',{className:'del',disabled:members.length<=1,style:{opacity:members.length<=1?.22:1},onClick:()=>delM(m.id)},'✕'),
      )),
      members.length<LIM.members&&h(Fragment,null,
        h('button',{className:'btn btn-ghost'+(showAdd?' warn':''),style:{marginTop:12,width:'100%'},onClick:()=>setShowAdd(p=>!p)},showAdd?'✕ 閉じる':'＋ メンバーを追加'),
        showAdd&&h('div',{className:'fi',style:{marginTop:12}},
          h('input',{className:'field',placeholder:'名前（例: じいじ、ばあば）',maxLength:20,value:newName,onChange:e=>setNewName(e.target.value)}),
          h('div',{style:{fontSize:10,fontWeight:800,color:'#AAA',letterSpacing:'.8px',marginBottom:6}},'絵文字'),
          h('div',{style:{display:'flex',gap:8,flexWrap:'wrap',marginBottom:10}},EMOJIS.map(e=>h('button',{key:e,style:{fontSize:24,padding:'4px 6px',borderRadius:10,border:'2px solid',borderColor:newEmoji===e?'#FF5E8A':'#E5E5E5',background:newEmoji===e?'#FFF0F5':'#fff'},onClick:()=>setNewEmoji(e)},e))),
          h('div',{style:{fontSize:10,fontWeight:800,color:'#AAA',letterSpacing:'.8px',marginBottom:6}},'カラー'),
          h('div',{className:'palette'},PAL.slice(0,12).map(c=>h('button',{key:c,className:'pal-dot'+(newClr===c?' on':''),style:{background:c},onClick:()=>setNewClr(c)}))),
          h('button',{className:'btn btn-grad',style:{background:newName.trim()?undefined:'#DDD',boxShadow:'none',color:newName.trim()?'#fff':'#AAA'},disabled:!newName.trim(),onClick:addM},'メンバーを追加'),
        ),
      ),
    ),
    h('div',{className:'card'},
      h('div',{className:'card-label'},'Firebase設定'),
      h('p',{style:{fontSize:13,color:'#888',marginBottom:12,lineHeight:1.7}},'Firebase設定をリセットして再設定画面に戻ります。データはFirebase上に残ります。'),
      h('button',{className:'btn btn-ghost warn',style:{width:'100%'},onClick:()=>{if(!confirm('Firebase設定をリセットしますか？'))return;onReset()}},'🔧 Firebase設定をやり直す'),
    ),
  );
}

createRoot(document.getElementById('root')).render(h(App, null));
</script>
</body>
</html>
